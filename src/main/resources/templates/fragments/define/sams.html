<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>

<!-- ============================================================================================================ -->
<!-- SAM List Fragment                                                                                            -->
<!-- ============================================================================================================ -->
<div th:fragment="listContent">
    <div class="card bg-base-100 shadow-xl border border-base-200">
        <div class="card-body">
            <div class="flex justify-between items-center">
                <h2 class="card-title">Semantic Alignment Methods (SAMs)</h2>
                <button class="btn btn-primary"
                        hx-get="/define/sams/new"
                        hx-target="#workspace"
                        hx-swap="innerHTML">
                    New SAM
                </button>
            </div>

            <div class="overflow-x-auto mt-4">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Type</th>
                        <th>Source</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sam : ${sams}">
                        <td th:text="${sam.samBasicDetails.name}"></td>
                        <td th:text="${sam.samBasicDetails.description}" class="max-w-md truncate"></td>
                        <td>
                            <span th:text="${sam.samRuntimeDetails.type.name() == 'BUILT_IN' ? 'Built-in' : 'Custom'}"
                                  th:classappend="${sam.samRuntimeDetails.type.name() == 'BUILT_IN' ? 'badge-neutral' : 'badge-accent'}"
                                  class="badge"></span>
                        </td>
                        <td>
                            <span th:each="src, iter : ${sam.samBasicDetails.source}"
                                  th:text="${src.name + (!iter.last ? ', ' : '')}"
                                  class="text-xs text-base-content/70"></span>
                        </td>
                        <td class="text-right">
                            <button class="btn btn-sm btn-ghost"
                                    th:hx-get="@{/define/sams/{id}/edit(id=${sam.samBasicDetails.uniqueId})}"
                                    hx-target="#workspace"
                                    hx-swap="innerHTML">
                                View / Edit
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<!-- ============================================================================================================ -->
<!-- SAM Editor Fragment                                                                                          -->
<!-- ============================================================================================================ -->
<div th:fragment="editorContent"
     th:with="isBuiltIn=${sam != null && sam.samRuntimeDetails != null && sam.samRuntimeDetails.type != null && sam.samRuntimeDetails.type.name() == 'BUILT_IN'}">

    <!-- We no longer need Alpine.js for the main form state -->
    <div>
        <form th:action="@{/define/sams}" method="post"
              hx-post="/define/sams"
              hx-target="#workspace"
              hx-swap="innerHTML"
              class="card bg-base-100 shadow-xl border border-base-200">

            <div class="card-body p-6 flex flex-col gap-6">

                <!-- Header & Actions -->
                <div class="flex justify-between items-start w-full">
                    <div>
                        <h2 class="card-title" th:text="${sam?.samBasicDetails?.name ?: 'New SAM'}"></h2>
                        <p th:if="${isBuiltIn}" class="text-warning font-semibold mt-1">This is a built-in SAM and
                            cannot be edited.</p>
                    </div>
                    <div class="card-actions justify-end">
                        <button type="button" class="btn btn-ghost" hx-get="/define/sams" hx-target="#workspace"
                                hx-swap="innerHTML">Cancel
                        </button>
                        <button type="submit" class="btn btn-primary" th:disabled="${isBuiltIn}">Save SAM</button>
                    </div>
                </div>

                <!-- Main Details Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
                    <!-- Left Column -->
                    <div class="flex flex-col gap-4">
                        <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                            <label class="label pr-4"><span class="label-text font-semibold">Name</span></label>
                            <input type="text" name="samBasicDetails.name" th:value="${sam?.samBasicDetails?.name}"
                                   class="input input-bordered w-full"
                                   required th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                            <label class="label pr-4"><span class="label-text font-semibold">Mnemonic</span></label>
                            <input type="text" name="samBasicDetails.mnemonic"
                                   th:value="${sam?.samBasicDetails?.mnemonic}"
                                   class="input input-bordered w-full" required th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control grid grid-cols-[1fr,2fr] items-start">
                            <label class="label pr-4 pt-2"><span
                                    class="label-text font-semibold">Description</span></label>
                            <textarea name="samBasicDetails.description" class="textarea textarea-bordered h-24 w-full"
                                      th:text="${sam?.samBasicDetails?.description}"
                                      th:disabled="${isBuiltIn}"></textarea>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="flex flex-col gap-4">
                        <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                            <label class="label pr-4"><span
                                    class="label-text font-semibold">Success Alias</span></label>
                            <input type="text" name="samBasicDetails.successAlias"
                                   th:value="${sam?.samBasicDetails?.successAlias}"
                                   class="input input-bordered w-full" th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                            <label class="label pr-4"><span
                                    class="label-text font-semibold">Failure Alias</span></label>
                            <input type="text" name="samBasicDetails.failureAlias"
                                   th:value="${sam?.samBasicDetails?.failureAlias}"
                                   class="input input-bordered w-full" th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                            <label class="label pr-4"><span class="label-text font-semibold">Input Type</span></label>
                            <select name="samAdvanceDetails.inputType" class="select select-bordered w-full"
                                    th:disabled="${isBuiltIn}"
                                    onchange="document.getElementById('piqi-section').style.display = (this.value === 'ELEMENT' || this.value === 'DATA_CLASS') ? 'block' : 'none'">
                                <option disabled th:selected="${sam?.samAdvanceDetails?.inputType == null}">Select an
                                    input type
                                </option>
                                <option th:each="type : ${inputTypes}"
                                        th:value="${type.name()}"
                                        th:text="${type.value}"
                                        th:selected="${type == sam?.samAdvanceDetails?.inputType}"></option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Conditional PIQI Model Section (Vanilla JS toggled) -->
                <div id="piqi-section" class="p-4 border border-dashed border-base-300 rounded-box bg-base-200/50"
                     th:style="${sam?.samAdvanceDetails?.inputType != null and (sam.samAdvanceDetails.inputType.name() == 'ELEMENT' or sam.samAdvanceDetails.inputType.name() == 'DATA_CLASS')} ? 'display: block;' : 'display: none;'">
                    <h3 class="font-bold text-lg mb-2">PIQI Model Requirement</h3>
                    <p class="text-sm mb-4 text-base-content/70">This input type requires a PIQI Model
                        specification.</p>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-x-6 gap-y-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text">PIQI Model Mnemonic</span></label>
                            <input type="text" name="samAdvanceDetails.piqiModel.mnemonic"
                                   th:value="${sam?.samAdvanceDetails?.piqiModel?.mnemonic}"
                                   class="input input-bordered"
                                   th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text">PIQI Model Version</span></label>
                            <input type="text" name="samAdvanceDetails.piqiModel.version"
                                   th:value="${sam?.samAdvanceDetails?.piqiModel?.version}"
                                   class="input input-bordered" th:disabled="${isBuiltIn}"/>
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text">PIQI Version Mnemonic</span></label>
                            <input type="text" name="samAdvanceDetails.piqiModel.versionMnemonic"
                                   th:value="${sam?.samAdvanceDetails?.piqiModel?.versionMnemonic}"
                                   class="input input-bordered"
                                   th:disabled="${isBuiltIn}"/>
                        </div>
                    </div>
                </div>

                <!-- Divider -->
                <div class="divider">Parameters</div>

                <!-- ================================================== -->
                <!-- PARAMETERS FRAGMENT LOADER                         -->
                <!-- ================================================== -->
                <div th:replace="~{:: parametersFragment(sam=${sam}, isBuiltIn=${isBuiltIn}, parameterTypes=${parameterTypes})}"></div>


                <!-- Divider -->
                <div class="divider">Advanced</div>

                <!-- Advanced Details Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-4">
                    <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                        <label class="label pr-4"><span class="label-text font-semibold">Prerequisite SAM</span></label>
                        <input type="text" name="samAdvanceDetails.prerequisiteSamMnemonic"
                               th:value="${sam?.samAdvanceDetails?.prerequisiteSamMnemonic}"
                               class="input input-bordered w-full" th:disabled="${isBuiltIn}"/>
                    </div>
                    <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                        <label class="label pr-4"><span class="label-text font-semibold">HDQT Dimension</span></label>
                        <input type="text" name="samAdvanceDetails.hdqtDimensionMnemonic"
                               th:value="${sam?.samAdvanceDetails?.hdqtDimensionMnemonic}"
                               class="input input-bordered w-full" th:disabled="${isBuiltIn}"/>
                    </div>
                    <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                        <label class="label pr-4"><span class="label-text font-semibold">Execution Type</span></label>
                        <select name="samAdvanceDetails.executionType" class="select select-bordered w-full"
                                th:disabled="${isBuiltIn}">
                            <option disabled th:selected="${sam?.samAdvanceDetails?.executionType == null}">Select an
                                execution type
                            </option>
                            <option th:each="type : ${executionTypes}"
                                    th:value="${type.name()}"
                                    th:text="${type.value}"
                                    th:selected="${type == sam?.samAdvanceDetails?.executionType}"></option>
                        </select>
                    </div>
                    <div class="form-control grid grid-cols-[1fr,2fr] items-center">
                        <label class="label pr-4"><span class="label-text font-semibold">Execution Ref.</span></label>
                        <input type="text" name="samAdvanceDetails.executionReference"
                               th:value="${sam?.samAdvanceDetails?.executionReference}"
                               class="input input-bordered w-full" th:disabled="${isBuiltIn}"/>
                    </div>
                </div>

                <!-- Hidden fields -->
                <input type="hidden" name="samBasicDetails.uniqueId" th:value="${sam?.samBasicDetails?.uniqueId}"/>
                <input type="hidden" name="samBasicDetails.createdDateTime"
                       th:value="${sam?.samBasicDetails?.createdDateTime}"/>
                <input type="hidden" name="samBasicDetails.modifiedDateTime"
                       th:value="${sam?.samBasicDetails?.modifiedDateTime}"/>
                <input type="hidden" name="samRuntimeDetails.type"
                       th:value="${sam?.samRuntimeDetails?.type ?: 'CUSTOM'}"/>
            </div>
        </form>
    </div>
</div>


<!-- ============================================================================================================ -->
<!-- Parameters Fragment (for HTMX swapping)                                                                      -->
<!-- ============================================================================================================ -->
<div th:fragment="parametersFragment(sam, isBuiltIn, parameterTypes)" id="parameters-editor"
     class="flex flex-col gap-4">

    <div th:if="${sam == null or sam.samAdvanceDetails == null or sam.samAdvanceDetails.parameters == null or sam.samAdvanceDetails.parameters.isEmpty()}"
         class="p-4 text-center text-base-content/60 bg-base-200 rounded-box">
        This SAM has no parameters.
    </div>

    <!-- Parameter Table -->
    <div th:if="${sam != null and sam.samAdvanceDetails != null and sam.samAdvanceDetails.parameters != null and !sam.samAdvanceDetails.parameters.isEmpty()}"
         class="overflow-x-auto">
        <table class="table w-full">
            <thead>
            <tr>
                <th>Name</th>
                <th>Type</th>
                <th>Description</th>
                <th class="w-1"></th> <!-- Action column -->
            </tr>
            </thead>
            <tbody>
            <tr th:each="parameter, stat : ${sam.samAdvanceDetails.parameters}">
                <!-- NEW: Hidden field to prevent primitive boolean null-binding exception -->
                <input type="hidden"
                       th:name="|samAdvanceDetails.parameters[${stat.index}].isOptional|"
                       th:value="${parameter.isOptional}"/>
                <!-- Name Input -->
                <td>
                    <input type="text" th:name="|samAdvanceDetails.parameters[${stat.index}].name|"
                           th:value="${parameter.name}"
                           class="input input-bordered w-full" placeholder="Parameter Name" th:disabled="${isBuiltIn}">
                </td>
                <!-- Type Select -->
                <td>
                    <select th:name="|samAdvanceDetails.parameters[${stat.index}].parameterType|"
                            class="select select-bordered w-full" th:disabled="${isBuiltIn}">
                        <option value="">Select Type</option>
                        <option th:each="ptype : ${parameterTypes}"
                                th:value="${ptype.name()}"
                                th:text="${ptype.displayName}"
                                th:selected="${ptype == parameter.parameterType}"></option>
                    </select>
                </td>
                <!-- Description Input -->
                <td>
                    <input type="text" th:name="|samAdvanceDetails.parameters[${stat.index}].description|"
                           th:value="${parameter.description}"
                           class="input input-bordered w-full" placeholder="Parameter Description"
                           th:disabled="${isBuiltIn}">
                </td>
                <!-- Remove Button -->
                <td>
                    <button type="button"
                            th:hx-post="@{/define/sams/remove-parameter(removeIndex=${stat.index})}"
                            hx-target="#parameters-editor"
                            hx-swap="outerHTML"
                            hx-include="closest form"
                            class="btn btn-ghost btn-sm btn-circle"
                            th:disabled="${isBuiltIn}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Add/Save Actions -->
    <div class="card-actions justify-between mt-2">
        <button type="button"
                hx-post="/define/sams/add-parameter"
                hx-target="#parameters-editor"
                hx-swap="outerHTML"
                hx-include="closest form"
                class="btn btn-secondary btn-sm"
                th:disabled="${isBuiltIn}">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                 stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Add Parameter
        </button>
        <button type="button"
                hx-post="/define/sams/update-parameters"
                hx-target="#parameters-editor"
                hx-swap="outerHTML"
                hx-include="closest form"
                class="btn btn-primary btn-sm"
                th:disabled="${isBuiltIn}">
            Save Parameters
        </button>
    </div>
</div>

</body>
</html>
