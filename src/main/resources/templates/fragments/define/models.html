<div th:fragment="list" class="flex flex-col gap-4">

    <div class="flex justify-between items-center bg-base-100 p-4 rounded-box border border-base-200 shadow-sm">
        <div>
            <h2 class="text-xl font-bold">Data Models</h2>
            <p class="text-sm text-gray-500">Manage JSON Schema definitions for data extraction.</p>
        </div>

        <button class="btn btn-primary shadow-sm"
                hx-get="/define/models/new"
                hx-target="#workspace"
                hx-swap="innerHTML">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            New Data Model
        </button>
    </div>

    <div class="bg-base-100 rounded-box border border-base-200 shadow-sm overflow-hidden">
        <table class="table table-zebra w-full">
            <thead class="bg-base-200">
            <tr>
                <th>ID</th>
                <th>Model Name</th>
                <th>Last Updated</th>
                <th class="text-right">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="model : ${models}">
                <td class="font-mono text-xs text-gray-500" th:text="${model.id}">1</td>
                <td class="font-bold text-primary" th:text="${model.name}">Clinical_Lab_Result_v2</td>
                <td th:text="${#temporals.format(model.updatedAt, 'yyyy-MM-dd HH:mm')}">2026-06-19 14:30</td>
                <td class="text-right space-x-2">

                    <button class="btn btn-sm btn-ghost"
                            th:hx-get="@{/define/models/{id}/edit(id=${model.id})}"
                            hx-target="#workspace">
                        Edit
                    </button>

                    <button class="btn btn-sm btn-error btn-outline"
                            th:hx-delete="@{/api/define/models/{id}(id=${model.id})}"
                            hx-confirm="Are you sure you want to delete this Data Model? This action cannot be undone."
                            hx-target="#workspace">
                        Delete
                    </button>

                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(models)}">
                <td colspan="4" class="text-center py-8 text-gray-500 italic">
                    No Data Models configured. Click "New Data Model" to get started.
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>


<div th:fragment="editor" class="h-full">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/dracula.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>

    <form hx-post="/api/define/models"
          hx-target="#workspace"
          class="card bg-base-100 shadow-xl border border-base-200 h-full">

        <input type="hidden" name="id" th:value="${model?.id}" />

        <div class="card-body p-6 flex flex-col gap-4">
            <div class="flex justify-between items-start w-full">

                <div class="form-control w-full max-w-md">
                    <label class="label pt-0">
                        <span class="label-text font-bold text-lg">Data Model Name</span>
                    </label>
                    <input type="text"
                           name="name"
                           placeholder="e.g., Clinical_Lab_Result_v2"
                           class="input input-bordered input-primary w-full shadow-sm font-mono"
                           th:value="${model?.name}"
                           required />
                </div>

                <div class="card-actions justify-end mt-7">
                    <button type="button"
                            class="btn btn-ghost"
                            hx-get="/define/models"
                            hx-target="#workspace">
                        Cancel
                    </button>
                    <button type="submit" class="btn btn-primary shadow-sm">
                        <span th:text="${model?.id == null ? 'Create Model' : 'Update Schema'}"></span>
                    </button>
                </div>
            </div>

            <div x-data="jsonEditor()" class="flex-grow border border-base-300 rounded-box shadow-inner overflow-hidden flex flex-col bg-base-200">
                <div class="bg-base-300 px-4 py-2 text-sm font-mono text-base-content/70 flex justify-between border-b border-base-300">
                    <span>schema_definition.json</span>
                    <span class="badge badge-outline badge-sm mt-0.5 border-primary text-primary">JSON Schema</span>
                </div>

                <textarea id="json-input"
                          name="schemaDefinition"
                          x-ref="textarea"
                          style="display:none;"
                          th:text="${model?.schemaDefinition ?: '{\n  &quot;$schema&quot;: &quot;https://json-schema.org/draft/2020-12/schema&quot;,\n  &quot;type&quot;: &quot;object&quot;,\n  &quot;properties&quot;: {\n    \n  }\n}'}"></textarea>

                <div x-ref="editorContainer" class="flex-grow min-h-[450px] w-full"></div>
            </div>
        </div>
    </form>
</div>
