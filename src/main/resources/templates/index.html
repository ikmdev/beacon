<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(activePage, content, hasNotifications)"
      x-data="{ darkMode: false }"
      x-init="darkMode = localStorage.theme === 'night'; document.documentElement.setAttribute('data-theme', darkMode ? 'night' : 'corporate')"
      data-theme="corporate">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle}">Beacon Home</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <link rel="icon" type="image/png" href="/images/beacon_logo.png">
    <script src="https://unpkg.com/htmx.org@2.0.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script th:src="@{/js/components.js}"></script>
</head>
<body hx-boost="true" class="min-h-screen bg-base-200 text-base-content antialiased">
<div class="flex min-h-screen flex-col">
    <header id="header" class="sticky top-0 z-30 border-b border-base-300 bg-base-100/90 backdrop-blur">
        <div class="navbar mx-auto w-full max-w-7xl px-4 sm:px-6">
            <div class="navbar-start">
                <div class="dropdown">
                    <label tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M4 6h16M4 12h16M4 18h7"/>
                        </svg>
                    </label>
                    <ul tabindex="0"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
                        <li th:classappend="${activePage == 'home' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a href="/">Home</a>
                        </li>
                        <li th:classappend="${activePage == 'define' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/define">Define</a></li>
                        <li th:classappend="${activePage == 'configure' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/configure">Configure</a></li>
                        <li th:classappend="${activePage == 'evaluate' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/evaluate">Evaluate</a></li>
                        <li th:classappend="${activePage == 'analyze' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/analyze">Analyze</a></li>
                    </ul>
                </div>
                <div class="hidden lg:flex">
                    <ul class="menu menu-horizontal px-1 text-sm">
                        <li th:classappend="${activePage == 'home' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a href="/">Home</a>
                        </li>
                        <li th:classappend="${activePage == 'define' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/define">Define</a></li>
                        <li th:classappend="${activePage == 'configure' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/configure">Configure</a></li>
                        <li th:classappend="${activePage == 'evaluate' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/evaluate">Evaluate</a></li>
                        <li th:classappend="${activePage == 'analyze' ? 'active bg-primary text-primary-content rounded-full' : ''}">
                            <a
                                    href="/analyze">Analyze</a></li>
                    </ul>
                </div>
            </div>

            <div class="navbar-center">
                <a href="/" class="text-xl">
                    <img src="/images/beacon_logo.png" alt="Beacon" class="h-6 w-auto">
                </a>
            </div>

            <div class="navbar-end">
                <button class="btn btn-ghost btn-circle" aria-label="Search">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </button>
                <button class="btn btn-ghost btn-circle" aria-label="View notifications">
                    <div class="indicator">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                             stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                        </svg>
                        <span th:if="${hasNotifications}" class="badge badge-xs badge-primary indicator-item"></span>
                    </div>
                </button>
            </div>
        </div>
    </header>

    <main id="main" class="flex-1 py-10">
        <div class="mx-auto max-w-7xl px-4 sm:px-6" >
            <th:block th:replace="${content}"></th:block>
        </div>
    </main>

    <footer id="footer" class="footer-shell border-t border-base-300 px-4 py-12 text-base-content sm:px-6">

    </footer>
</div>
</body>
</html>
